name: the_book_tool
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^16.2.4
  provider: ^6.1.5+1
  sqflite_common_ffi: ^2.3.6
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_markdown: ^0.7.7+1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.2
  window_manager: ^0.5.1
  openai_dart: ^0.5.5
  google_fonts: ^6.3.2
  pdf: ^3.11.3
  file_selector: ^1.0.4
  http: ^1.5.0
  markdown: ^7.3.0
  flutter_svg: ^2.2.1
  icons_launcher: ^3.0.3
  url_launcher: ^6.3.2
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
  - assets/fonts/Roboto-Regular.ttf
  - assets/fonts/Roboto-Bold.ttf
  - assets/fonts/Roboto-Italic.ttf
  - assets/fonts/Roboto-BoldItalic.ttf
  - assets/fonts/Merriweather-Regular.ttf
  - assets/fonts/Merriweather-Bold.ttf
  - assets/fonts/Merriweather-Italic.ttf
  - assets/fonts/Merriweather-BoldItalic.ttf
  - assets/fonts/OpenSans-Regular.ttf
  - assets/fonts/OpenSans-Bold.ttf
  - assets/fonts/OpenSans-Italic.ttf
  - assets/fonts/OpenSans-BoldItalic.ttf
  - assets/fonts/SourceSerif4-Regular.ttf
  - assets/fonts/SourceSerif4-Bold.ttf
  - assets/fonts/SourceSerif4-Italic.ttf
  - assets/fonts/SourceSerif4-BoldItalic.ttf
  - assets/images/OpenAI-black-monoblossom.svg
  - assets/images/OpenAI-white-monoblossom.svg

# dart run icons_launcher:create
icons_launcher:
  image_path: 'assets/icon_1024.png'
  platforms:
    macos:
      enable: true
